<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#15141b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Obsidian Notifier PWA</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: #15141b;
        color: #fff;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      main {
        width: min(680px, 92vw);
        background: #1d1b23;
        border: 1px solid #2d2c33;
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 16px;
        color: #cbcad3;
      }
      .row {
        display: grid;
        gap: 10px;
      }
      label {
        font-size: 14px;
        color: #d8d6e1;
      }
      input,
      textarea,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #383643;
        background: #14131a;
        color: #fff;
        font: inherit;
      }
      input,
      textarea {
        padding: 10px 12px;
      }
      textarea {
        min-height: 180px;
        resize: vertical;
      }
      button {
        padding: 10px 14px;
        background: #164eb6;
        border: 0;
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
      }
      .subtle {
        margin-top: 20px;
        font-size: 13px;
      }
      a {
        color: #7ab8ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>🔔 Obsidian Notifier PWA</h1>
      <p>This app only receives push notifications and shows them on your device.</p>

      <div class="row">
        <label for="vapidKey">VAPID public key (from your local Node server)</label>
        <input id="vapidKey" type="text" placeholder="BEl3..." autocomplete="off" />
        <button id="subscribeBtn" type="button">Enable push notifications</button>
      </div>

      <p class="status" id="status">Status: waiting</p>

      <div class="row">
        <label for="subscriptionOutput">Push subscription (copy this to your backend)</label>
        <textarea id="subscriptionOutput" readonly placeholder="Subscription JSON will appear here"></textarea>
      </div>

      <p class="subtle">
        Redirection route:
        <a href="/redirection-page">/redirection-page</a>
      </p>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
